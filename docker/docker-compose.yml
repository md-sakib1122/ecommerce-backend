# api + postgres + redis
#
# Run from the repo root:
#   docker compose -f docker/docker-compose.yml up --build
# Then apply migrations:
#   docker compose -f docker/docker-compose.yml exec api alembic upgrade head
# And (optionally) seed:
#   docker compose -f docker/docker-compose.yml exec api python seeders/seed.py

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # Loads JWT/Stripe/bKash secrets etc. Copy .env.example -> .env first.
    env_file:
      - ../.env
    # Overrides win over env_file: inside the compose network the DB/Redis
    # hostnames are the service names, not the 127.0.0.1 values in .env.
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ecommerce
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Dev hot-reload: uncomment the two blocks below.
    # volumes:
    #   - ../app:/code/app
    # command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
